<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- agent -->
  <rect x="280" y="18" width="400" height="64" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.6" filter="url(#sh)"/>
  <text x="480" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#4c1d95">🤖 Your AI coding agent</text>
  <text x="480" y="64" text-anchor="middle" font-size="11.5" fill="#64748b">Claude Code · Codex · any AGENTS.md agent</text>
  <line x1="480" y1="84" x2="480" y2="120" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="492" y="106" font-size="10.5" fill="#64748b">reads &amp; orchestrates</text>

  <!-- desk container -->
  <rect x="30" y="124" width="900" height="520" rx="14" fill="#f8fafc" fill-opacity="0.5" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5 5"/>
  <text x="56" y="154" font-size="13" font-weight="700" fill="#64748b">🏛️ THE DESK — SKILL.md + skills/</text>

  <!-- pipeline row -->
  <rect x="58" y="176" width="186" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4" filter="url(#sh)"/>
  <text x="151" y="205" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e3a8a">🌍 Macro / Regime</text>
  <text x="151" y="226" text-anchor="middle" font-size="11" fill="#64748b">sets the weather</text>

  <rect x="272" y="176" width="186" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4" filter="url(#sh)"/>
  <text x="365" y="205" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e3a8a">🌊 Thematic Wave</text>
  <text x="365" y="226" text-anchor="middle" font-size="11" fill="#64748b">where capital rotates</text>

  <rect x="486" y="176" width="186" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4" filter="url(#sh)"/>
  <text x="579" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">📊 Quant / Chip Engine</text>
  <text x="579" y="226" text-anchor="middle" font-size="11" fill="#64748b">levels · RR · chip distribution</text>

  <rect x="700" y="176" width="186" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4" filter="url(#sh)"/>
  <text x="793" y="205" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e3a8a">👥 Analyst Team</text>
  <text x="793" y="226" text-anchor="middle" font-size="11" fill="#64748b">four independent lenses</text>

  <line x1="246" y1="211" x2="268" y2="211" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="460" y1="211" x2="482" y2="211" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="674" y1="211" x2="696" y2="211" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- team -> debate elbow -->
  <path d="M793,246 L793,322 L638,322" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- debate -->
  <rect x="330" y="290" width="300" height="64" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.4" filter="url(#sh)"/>
  <text x="480" y="317" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9a3412">⚔️ Research Debate</text>
  <text x="480" y="337" text-anchor="middle" font-size="11" fill="#64748b">Bull vs Bear → Research Manager</text>
  <line x1="480" y1="354" x2="480" y2="380" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- risk -->
  <rect x="330" y="384" width="300" height="64" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.4" filter="url(#sh)"/>
  <text x="480" y="411" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9a3412">🛡️ Risk Committee</text>
  <text x="480" y="431" text-anchor="middle" font-size="11" fill="#64748b">Aggressive · Neutral · Conservative → Judge</text>
  <line x1="480" y1="448" x2="480" y2="466" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- gate -->
  <polygon points="480,470 572,506 480,542 388,506" fill="#fefce8" stroke="#eab308" stroke-width="1.6" filter="url(#sh)"/>
  <text x="480" y="511" text-anchor="middle" font-size="13.5" font-weight="700" fill="#854d0e">🚪 CIO Gate</text>

  <!-- gate -> report -->
  <line x1="576" y1="506" x2="644" y2="506" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="602" y="494" text-anchor="middle" font-size="10" fill="#64748b">high-edge ideas</text>
  <rect x="650" y="474" width="230" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4" filter="url(#sh)"/>
  <text x="765" y="501" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">📄 Report</text>
  <text x="765" y="521" text-anchor="middle" font-size="11" fill="#64748b">entry · stop · target · size</text>

  <!-- gate -> pass -->
  <line x1="384" y1="506" x2="318" y2="506" stroke="#64748b" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="351" y="496" text-anchor="middle" font-size="10.5" fill="#64748b">most days</text>
  <rect x="80" y="474" width="234" height="64" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4" stroke-dasharray="4 4"/>
  <text x="197" y="501" text-anchor="middle" font-size="12.5" font-weight="700" fill="#64748b">💤 “Nothing clears the bar”</text>
  <text x="197" y="521" text-anchor="middle" font-size="11" fill="#64748b">and that’s the discipline</text>

  <!-- report -> memory -->
  <line x1="765" y1="538" x2="765" y2="562" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="650" y="566" width="230" height="58" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4" filter="url(#sh)"/>
  <text x="765" y="590" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">🧠 Log &amp; Reflect</text>
  <text x="765" y="608" text-anchor="middle" font-size="11" fill="#64748b">score vs SPY → one lesson</text>

  <!-- memory loop back to analyst team -->
  <path d="M882,595 C 924,595 924,211 892,211" fill="none" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="944" y="403" text-anchor="middle" font-size="10.5" fill="#64748b" transform="rotate(-90 944 403)">recall lessons on the next run</text>

  <!-- desk <-> broker -->
  <line x1="350" y1="688" x2="350" y2="650" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="338" y="672" text-anchor="end" font-size="10.5" fill="#64748b">quotes · fundamentals · positions</text>
  <line x1="610" y1="648" x2="610" y2="686" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="622" y="672" font-size="10.5" fill="#64748b">you approve → the order is placed</text>

  <!-- broker -->
  <rect x="250" y="690" width="460" height="70" rx="12" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.6" filter="url(#sh)"/>
  <text x="480" y="715" text-anchor="middle" font-size="15" font-weight="700" fill="#9d174d">🏦 The Broker</text>
  <text x="480" y="735" text-anchor="middle" font-size="11.5" fill="#64748b">Robinhood today · IBKR / Futu next</text>
  <text x="480" y="752" text-anchor="middle" font-size="10.5" fill="#64748b">market data in · confirm-before-order out</text>
</svg>
